<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var mısın yok musun 2026</title>
    <meta name="description" content="Efsane yarışma Var mısın Yok musun artık güncel formatıyla web tarayıcınızda! Kutunu seç, bankanın acımasız tekliflerini reddet ve büyük ödülü kazan.">
    <meta name="keywords" content="varmısın yokmusun, var mısın yok musun oyna, varmısın yokmusun güncel, kutu açma oyunu, kutu seçme oyunu, banka teklifi oyunu, retro varmısın yokmusun, tarayıcıda kutu oyunu, esra erol varmısın yokmusun, online kutu açma oyunu, çerezlik web oyunları">
    <meta name="author" content="Ahmet Arif">

    <meta property="og:title" content="Varmısın Yokmusun? - Güncel Formatlı Kutu Açma Oyunu">
    <meta property="og:description" content="Kutunu seç, heyecana ortak ol! Bankayı batırıp büyük ödülle stüdyodan ayrılabilecek misin? Hemen ücretsiz oyna.">
    <meta property="og:image" content="images/kutu_kapali.png">
    <meta property="og:type" content="website">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #0c0c0e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* GİRİŞ EKRANI */
        .giris-ekrani {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a1a26 0%, #07070a 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            transition: opacity 0.5s ease;
        }
        .giris-baslik {
            font-size: 36px;
            color: #ffcc00;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            font-weight: bold;
        }
        .giris-kutular-izgarasi {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 25px;
            max-width: 1000px;
            width: 100%;
        }
        .giris-kutu {
            position: relative;
            height: 120px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .giris-kutu:hover {
            transform: scale(1.15);
        }
        .giris-kutu-gorsel {
            width: 100%;
            height: 100%;
            background-image: url('images/kutu_kapali.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ANA OYUN SAHNESİ */
        .oyun-sahnesi {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('images/arka_plan.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        /* Ödül Panelleri */
        .odul-paneli {
            width: 220px; 
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }
        .odul-kart {
            height: 4.3%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px; 
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
            transition: all 0.3s;
        }
        .mavi { background: linear-gradient(to bottom, #005cbf, #004085); color: white; }
        .sari { background: linear-gradient(to bottom, #e0a800, #c69500); color: black; }
        .kirmizi { background: linear-gradient(to bottom, #bd2130, #a71d2a); color: white; }
        .elendi {
            background: #151518 !important;
            color: #444 !important;
            text-shadow: none !important;
            border: 1px solid transparent;
            opacity: 0.25;
            transform: scale(0.95);
        }

        .merkez-alanı {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            height: 100%;
            padding: 0 10px;
        }

        .konusma-balonu {
            position: absolute;
            bottom: 490px; 
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            padding: 14px 22px;
            border-radius: 14px;
            font-size: 17px; 
            font-weight: bold;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            border: 3px solid #ffcc00;
            z-index: 30;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .konusma-balonu::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 12px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent;
            display: block;
            width: 0;
        }
        .balon-aktif {
            opacity: 1;
            transform: translateY(0);
        }

        /* Sunucu Görseli */
        .sunucu-konteyner {
            position: absolute;
            bottom: 255px; 
            width: 250px; 
            height: 270px; 
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 6;
        }
        .sunucu-resim {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .sanal-masa-maskesi {
            position: absolute;
            bottom: 175px;
            width: 320px;
            height: 100px;
            background: transparent; 
            z-index: 8;
        }

        /* Oyuncunun Masadaki Kutusu */
        .kendi-kutun-alani {
            position: absolute;
            bottom: 235px; 
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .kendi-kutun-box {
            width: 140px; 
            height: 95px; 
            background-image: url('images/kutu_kapali.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.8));
        }
        .kutu-numara-etiket {
            color: #fff;
            text-shadow: 2px 2px 4px #000, -2px -2px 4px #000;
            font-size: 22px; 
            font-weight: bold;
            pointer-events: none;
            margin-bottom: 5px;
            transition: transform 0.2s; /* Dönüş animasyonu pürüzsüzleşsin diye eklendi */
        }

        #alt-durum-metni {
            position: absolute;
            bottom: 145px; 
            color: #ffcc00;
            font-size: 17px;
            background: rgba(0,0,0,0.9);
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            border: 2px solid rgba(255, 204, 0, 0.3);
            z-index: 10;
        }

        /* Yerdeki Kutular Tablosu (Devasa) */
        .kutular-tablosu {
            position: absolute;
            bottom: 15px;
            width: 100%;
            height: 260px; 
            background: rgba(0, 0, 0, 0.75);
            border: 3px solid rgba(255, 204, 0, 0.4);
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(7, 1fr); 
            grid-template-rows: repeat(3, 1fr);    
            gap: 12px;
            padding: 12px;
            z-index: 10;
        }
        .yerdeki-kutu {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        /* 3D Dönme Efekti */
        .yerdeki-kutu:hover {
            transform: scale(1.15) translateY(-5px) rotateY(180deg) !important; 
            z-index: 20;
        }
        /* Dönerken sayı ters okunmasın diye sayıyı geri döndürüyoruz */
        .yerdeki-kutu:hover .kutu-numara-etiket {
            transform: rotateY(180deg);
        }
        
        .kutu-gorsel {
            width: 100%;
            height: 100%;
            background-image: url('images/kutu_kapali.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .ayna-efekti {
            transform: scaleX(-1);
        }
        .ayna-efekti .kutu-numara-etiket {
            transform: scaleX(-1);
        }
        .ayna-efekti:hover {
            /* Ayna efektli olanlarda yönü düzelttik */
            transform: scaleX(-1) scale(1.15) translateY(-5px) rotateY(-180deg) !important; 
        }

        /* Kutu Açılma Efektleri */
        .kutu-aciliyor {
            animation: ucmaEfekti 0.6s forwards;
        }
        @keyframes ucmaEfekti {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(1.6) translateY(-40px); opacity: 0; }
        }
        
        .parlaklik-efekti {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,204,0,1) 0%, rgba(255,204,0,0) 70%);
            animation: patlama 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 25;
        }
        @keyframes patlama {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .floating-value {
            position: absolute;
            font-size: 26px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 12px #000;
            animation: suzulme 1.2s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            pointer-events: none;
            z-index: 26;
        }
        @keyframes suzulme {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }

        /* Karar Ekranı */
        .banka-karar-ekrani {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 110;
            justify-content: center;
            align-items: center;
        }
        .karar-kart {
            background: #171721;
            border: 4px solid #ffcc00;
            border-radius: 15px;
            padding: 45px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 0 40px rgba(255,204,0,0.5);
        }
        .karar-kart h2 {
            color: #ffcc00;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .teklif-miktarı {
            font-size: 52px;
            font-weight: bold;
            color: #28a745;
            margin: 25px 0;
            text-shadow: 0 0 20px rgba(40,167,69,0.4);
        }
        .karar-butonlar {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 30px;
        }
        .karar-btn {
            padding: 18px 45px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-tamam { background-color: #28a745; color: white; }
        .btn-tamam:hover { background-color: #218838; transform: scale(1.05); }
        .btn-devam { background-color: #dc3545; color: white; }
        .btn-devam:hover { background-color: #c82333; transform: scale(1.05); }

        /* Bitiş Ekranı */
        .oyun-bitti-ekrani {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 120;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .bitti-kart {
            max-width: 600px;
            width: 100%;
            background: #111;
            padding: 50px;
            border-radius: 15px;
            border: 3px solid #ffcc00;
            box-shadow: 0 0 45px rgba(255, 204, 0, 0.3);
        }
        .btn-tekrar {
            margin-top: 30px;
            background-color: #ffcc00;
            color: black;
            padding: 20px 60px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-tekrar:hover { background-color: #e0a800; transform: scale(1.05); }
        .reklam-kutusu {
            width: 320px;
            height: 50px;
            background-color: #222;
            border: 1px dashed #555;
            color: #777;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            margin: 30px auto 0 auto;
        }
    </style>
</head>
<body>

    <div class="giris-ekrani" id="giris-ekrani">
        <h1 class="giris-baslik">Kendi Kutunu Seçerek Oyuna Başla!</h1>
        <div class="giris-kutular-izgarasi" id="giris-kutular"></div>
    </div>

    <div class="oyun-sahnesi">
        <div class="odul-paneli" id="sol-oduller"></div>

        <div class="merkez-alanı">
            <div class="konusma-balonu" id="sunucu-balonu">Peki tamam, iletiyorum...</div>

            <div class="sunucu-konteyner">
                <img src="images/sunucu_normal.png" id="sunucu-resim" class="sunucu-resim" alt="Sunucu">
            </div>

            <div class="sanal-masa-maskesi"></div>

            <div class="kendi-kutun-alani" id="kendi-kutun-alani" style="display:none;">
                <div class="kutu-numara-etiket" id="kendi-kutu-etiket">00</div>
                <div class="kendi-kutun-box"></div>
            </div>

            <div id="alt-durum-metni">Yerde kalan kutulardan 4 tane aç!</div>

            <div class="kutular-tablosu" id="yerdeki-kutular"></div>
        </div>

        <div class="odul-paneli" id="sag-oduller"></div>

        <div class="banka-karar-ekrani" id="karar-ekrani">
            <div class="karar-kart">
                <h2>Banka Kararını Bekliyor</h2>
                <p style="color:#aaa;">Teklifi kabul ediyor musun?</p>
                <div class="teklif-miktarı" id="teklif-degeri">₺0</div>
                <div class="karar-butonlar">
                    <button class="karar-btn btn-tamam" onclick="kararVer(true)">TAMAM</button>
                    <button class="karar-btn btn-devam" onclick="kararVer(false)">DEVAM</button>
                </div>
            </div>
        </div>

        <div class="oyun-bitti-ekrani" id="bitti-ekrani">
            <div class="bitti-kart">
                <h1 style="color:#ffcc00; margin-bottom: 15px;">OYUN BİTTİ!</h1>
                <p id="bitti-mesaji" style="font-size: 22px; line-height: 1.5; color: #fff;"></p>
                <button class="btn-tekrar" onclick="oyunuSifirla()">YENİDEN BAŞLA</button>
                <div class="reklam-kutusu">Reklam Alanı (AdSense / Sponsor)</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
